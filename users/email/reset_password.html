<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <title>Passwort zurücksetzen</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style type="text/css">
    body {
      margin: 0;
      padding: 0;
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }
    table, td {
      border-collapse: collapse;
    }
    img {
      border: 0;
      height: auto;
      line-height: 100%;
      outline: none;
      text-decoration: none;
    }
    p {
      display: block;
      margin: 13px 0;
    }
  </style>
  <style type="text/css">
    @media only screen and (min-width: 480px) {
      .mj-column-per-100 {
        width: 100% !important;
        max-width: 100%;
      }
    }
  </style>
</head>

<body>
  <div style="margin:0px auto;max-width:600px;">
    <table align="center" border="0" cellpadding="0" cellspacing="0" role="presentation" style="width:100%;">
      <tbody>
        <tr>
          <td style="direction:ltr;font-size:0px;padding:20px 0;text-align:center;">
            <div style="font-family:Ubuntu, Helvetica, Arial, sans-serif;font-size:20px;line-height:1;text-align:left;color:#333333;">Hallo {{ user.email }},</div>
          </td>
        </tr>
        <tr>
          <td style="font-family:Ubuntu, Helvetica, Arial, sans-serif;font-size:16px;line-height:1;text-align:left;color:#333333;">
            Du hast eine Passwort-Zurücksetzung angefordert.
          </td>
        </tr>
        <tr>
          <td align="center" style="font-size:0px;padding:10px 25px;word-break:break-word;">
           <a href="{{ {{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
               style="background:#3366ff;color:#fff;padding:12px 24px;border-radius:4px;text-decoration:none;">
               Neues Passwort festlegen
            </a>
          </td>
        </tr>
        <tr>
          <td align="left" style="font-family:Ubuntu, Helvetica, Arial, sans-serif;font-size:12px;line-height:1;text-align:left;color:#888888;">
            Wenn du das nicht warst, ignoriere diese Nachricht.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
